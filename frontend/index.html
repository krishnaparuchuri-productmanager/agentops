                        whiteSpace:"pre-wrap", wordBreak:"break-word",
                        overflowWrap:"break-word", color:"#444",
                        fontFamily:"'SF Mono','Fira Code',monospace",
                        maxHeight:120, overflowY:"auto"
                      }}>{JSON.stringify(e.payload, null, 2)}</pre>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* Modal: New Version */}
      {showNewVersion && (
        <Modal title="Register New Version" large onClose={() => setShowNewVersion(false)}>
          <div className="modal-steps">
            {["Version Info","Config & Rules"].map((s,i) => (
              <div key={s} className={`modal-step-item ${versionStep===i+1?"active":versionStep>i+1?"done":""}`}>
                {versionStep>i+1?"✓ ":""}{i+1}. {s}
              </div>
            ))}
          </div>
          <form onSubmit={versionStep < 2 ? (e=>{e.preventDefault();setVersionStep(2);}) : submitNewVersion}>
            {versionStep === 1 && (<>
              {/* Version bump selector */}
              {(() => {
                const activeVer = versions.find(v => v.status === "active");
                const nextVer = bumpVersion(activeVer?.version || "0.0.0", versionBump);
                return (
                  <div className="card" style={{background:"#f0f4ff",boxShadow:"none",border:"1.5px solid #c5d0f5",marginBottom:16}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#3b5bdb",marginBottom:10}}>New Version Number (auto-generated)</div>
                    <div style={{display:"flex",gap:8,marginBottom:12}}>
                      {["major","minor","patch"].map(t => (
                        <button key={t} type="button"
                          onClick={() => setVersionBump(t)}
                          className={`btn btn-sm ${versionBump===t?"btn-primary":"btn-outline"}`}>
                          {t.charAt(0).toUpperCase()+t.slice(1)}
                          <span style={{fontSize:10,opacity:0.8,marginLeft:4}}>
                            ({bumpVersion(activeVer?.version||"0.0.0", t)})
                          </span>
                        </button>
                      ))}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <span style={{fontSize:12,color:"#888"}}>{activeVer ? `Current: ${activeVer.version}` : "No active version yet"} →</span>
                      <span style={{fontSize:22,fontWeight:700,color:"#3b5bdb"}}>{nextVer}</span>
                    </div>
                  </div>
                );
              })()}
              <div className="form-group">
                <label>Created By</label>
                <input value={versionForm.created_by}
                  onChange={e => setVersionForm({...versionForm, created_by: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Primary Model</label>
                <select value={versionForm.model} onChange={e => setVersionForm({...versionForm, model: e.target.value})}>
                  <option value="">— select a model —</option>
                  {MODEL_OPTIONS.map(g => (
                    <optgroup key={g.group} label={g.group}>
                      {g.models.map(m => <option key={m} value={m}>{m}</option>)}
                    </optgroup>
                  ))}
                </select>
              </div>
              <div className="form-group">
                <label>Changelog — what's new in this version</label>
                <textarea required placeholder="e.g. Upgraded to claude-sonnet-4-5, improved CAPA classification accuracy, added structured output validation." value={versionForm.changelog}
                  onChange={e => setVersionForm({...versionForm, changelog: e.target.value})} style={{minHeight:90}} />
              </div>
            </>)}
            {versionStep === 2 && (<>
              {/* Copy from agent */}
              <div className="card" style={{background:"#f8f9fa",boxShadow:"none",border:"1.5px dashed #ccc",marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:6}}>⚡ Copy config from an existing agent <span style={{fontWeight:400,color:"#aaa"}}>(optional)</span></div>
                <div style={{fontSize:12,color:"#888",marginBottom:10}}>Pre-fills eval threshold, guardrails and golden rules. You can edit everything after.</div>
                <select value={copyFrom} onChange={e => handleCopyFrom(e.target.value)}>
                  <option value="">✦ Start Fresh — all blank</option>
                  {allAgents.map(a => {
                    const c = typeof a.classification === "string" ? JSON.parse(a.classification) : (a.classification || {});
                    return (
                      <option key={a.id} value={a.id}>
                        {a.name} · {a.current_stage} · {c.model || "no model"} · {c.product || a.id}
                      </option>
                    );
                  })}
                </select>
                {copyFrom && (
                  <div style={{marginTop:8,fontSize:11,color:"#2f9e44"}}>
                    ✓ Config pre-filled from selected agent — review and edit below
                  </div>
                )}
              </div>
              <div className="form-group">
                <label>Eval Pass Threshold (%)</label>
                <input type="number" min="0" max="100" step="1" value={Math.round((versionForm.eval_threshold||0.8)*100)}
                  onChange={e => setVersionForm({...versionForm, eval_threshold: parseFloat(e.target.value)/100})} />
              </div>
              <div className="form-group">
                <label>Guardrails</label>
                <ChipInput value={versionForm.guardrails} onChange={v => setVersionForm({...versionForm, guardrails: v})}
                  placeholder="e.g. No PII in output" color="chip-orange" />
              </div>
              <div className="form-group" style={{marginTop:14}}>
                <label>Golden Rules</label>
                <ChipInput value={versionForm.golden_rules} onChange={v => setVersionForm({...versionForm, golden_rules: v})}
                  placeholder="e.g. Always cite source document" color="chip-green" />
              </div>
            </>)}
            {actionMsg && showNewVersion && <div className={`alert alert-${actionMsg.type}`}>{actionMsg.text}</div>}
            <div className="modal-actions">
              <button type="button" className="btn btn-outline" onClick={() => setShowNewVersion(false)}>Cancel</button>
              {versionStep > 1 && <button type="button" className="btn btn-outline" onClick={() => setVersionStep(1)}>← Back</button>}
              <button type="submit" className="btn btn-primary" disabled={submitting}>
                {versionStep < 2 ? "Next →" : submitting ? "Creating…" : "Create Version"}
              </button>
            </div>
          </form>
        </Modal>
      )}

      {/* Modal: Edit Agent */}
      {showEdit && (
        <Modal title="Edit Agent" large onClose={() => setShowEdit(false)}>
          <div className="modal-steps">
            {["Identity","Context & Classification","Config"].map((s,i) => (
              <div key={s} className={`modal-step-item ${editStep===i+1?"active":editStep>i+1?"done":""}`}>
                {editStep>i+1?"✓ ":""}{i+1}. {s}
              </div>
            ))}
          </div>
          <form onSubmit={editStep < 3 ? (e => { e.preventDefault(); setEditStep(editStep+1); }) : submitEdit}>
            {editStep === 1 && (<>
              <div className="form-group">
                <label>Name</label>
                <input required value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Owner</label>
                <input required value={editForm.owner} onChange={e => setEditForm({...editForm, owner: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Description</label>
                <textarea value={editForm.description} onChange={e => setEditForm({...editForm, description: e.target.value})} />
              </div>
            </>)}
            {editStep === 2 && (<>
              <div className="grid-2" style={{gap:10}}>
                <div className="form-group">
                  <label>Product</label>
                  <select value={editForm.product||""} onChange={e => {
                    const cat = PRODUCT_CATALOG.find(c => c.product === e.target.value);
                    setEditForm({...editForm, product: e.target.value, workflow: "", domain: cat ? cat.domain : ""});
                  }}>
                    <option value="">— select product —</option>
                    {PRODUCT_CATALOG.map(c => <option key={c.product} value={c.product}>{c.product}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Workflow</label>
                  <select value={editForm.workflow||""} onChange={e => setEditForm({...editForm, workflow: e.target.value})} disabled={!editForm.product}>
                    <option value="">— select workflow —</option>
                    {(PRODUCT_CATALOG.find(c => c.product === editForm.product)?.workflows || []).map(w => <option key={w} value={w}>{w}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Domain <span style={{fontWeight:400,color:"#aaa"}}>(auto-populated)</span></label>
                  <input readOnly value={editForm.domain||""} style={{background:"#f8f9fa",color:"#555",cursor:"default"}} />
                </div>
                <div className="form-group">
                  <label>Environment</label>
                  <select value={editForm.environment||"production"} onChange={e => setEditForm({...editForm, environment: e.target.value})}>
                    <option value="production">Production</option>
                    <option value="staging">Staging</option>
                    <option value="development">Development</option>
                  </select>
                </div>
              </div>
              <div className="section-label">Risk & Classification</div>
              {[["production_critical","Production Critical"],["pii_access","PII Access"],["regulated_domain","Regulated Domain"],["escalates_to_human","Escalates to Human"]].map(([k,label]) => (
                <div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <input type="checkbox" checked={!!editForm[k]} onChange={e => setEditForm({...editForm,[k]:e.target.checked})} style={{width:"auto"}} />
                  <span style={{fontSize:13}}>{label}</span>
                </div>
              ))}
            </>)}
            {editStep === 3 && (<>
              <div className="form-group">
                <label>Primary Model</label>
                <select value={editForm.model||""} onChange={e => setEditForm({...editForm, model: e.target.value})}>
                  <option value="">— select a model —</option>
                  {MODEL_OPTIONS.map(g => (
                    <optgroup key={g.group} label={g.group}>
                      {g.models.map(m => <option key={m} value={m}>{m}</option>)}
                    </optgroup>
                  ))}
                </select>
              </div>
              <div className="form-group">
                <label>Eval Pass Threshold (%)</label>
                <input type="number" min="0" max="100" step="1" value={Math.round((editForm.eval_threshold||0.8)*100)}
                  onChange={e => setEditForm({...editForm, eval_threshold: parseFloat(e.target.value)/100})} />
              </div>
              <div className="form-group">
                <label>Guardrails</label>
                <ChipInput value={editForm.guardrails||[]} onChange={v => setEditForm({...editForm, guardrails: v})}
                  placeholder="e.g. No PII in output" color="chip-orange" />
              </div>
              <div className="form-group" style={{marginTop:14}}>
                <label>Golden Rules</label>
                <ChipInput value={editForm.golden_rules||[]} onChange={v => setEditForm({...editForm, golden_rules: v})}
                  placeholder="e.g. Always cite source document" color="chip-green" />
              </div>

              <div className="section-label" style={{marginTop:20}}>💰 Budget & Token Limits</div>
              <div style={{fontSize:12,color:"#888",marginBottom:12}}>
                Operational hard limits enforced at the platform level — not by the LLM. Leave blank to set no limit.
              </div>
              <div className="grid-2" style={{gap:10}}>
                <div className="form-group">
                  <label>Max tokens per call</label>
                  <input type="number" min="1" placeholder="e.g. 2000"
                    value={editForm.budget_config?.max_tokens_per_call||""}
                    onChange={e => setEditForm({...editForm, budget_config: {...(editForm.budget_config||{}), max_tokens_per_call: e.target.value ? parseInt(e.target.value) : undefined}})} />
                  <div style={{fontSize:11,color:"#888",marginTop:3}}>Hard cap on input + output tokens per single request</div>
                </div>
                <div className="form-group">
                  <label>Max cost per session (USD)</label>
                  <input type="number" min="0" step="0.001" placeholder="e.g. 0.05"
                    value={editForm.budget_config?.max_cost_per_session||""}
                    onChange={e => setEditForm({...editForm, budget_config: {...(editForm.budget_config||{}), max_cost_per_session: e.target.value ? parseFloat(e.target.value) : undefined}})} />
                  <div style={{fontSize:11,color:"#888",marginTop:3}}>Per-conversation spend ceiling</div>
                </div>
                <div className="form-group">
                  <label>Max cost per day (USD)</label>
                  <input type="number" min="0" step="0.01" placeholder="e.g. 5.00"
                    value={editForm.budget_config?.max_cost_per_day||""}
                    onChange={e => setEditForm({...editForm, budget_config: {...(editForm.budget_config||{}), max_cost_per_day: e.target.value ? parseFloat(e.target.value) : undefined}})} />
                  <div style={{fontSize:11,color:"#888",marginTop:3}}>Daily spend cap — agent paused if exceeded</div>
                </div>
                <div className="form-group">
                  <label>Monthly budget (USD)</label>
                  <input type="number" min="0" step="1" placeholder="e.g. 50"
                    value={editForm.budget_config?.monthly_budget||""}
                    onChange={e => setEditForm({...editForm, budget_config: {...(editForm.budget_config||{}), monthly_budget: e.target.value ? parseFloat(e.target.value) : undefined}})} />
                  <div style={{fontSize:11,color:"#888",marginTop:3}}>Total monthly cost allowance</div>
                </div>
              </div>
              <div className="form-group">
                <label>Alert at (% of daily budget)</label>
                <input type="number" min="1" max="100" step="1"
                  value={editForm.budget_config?.alert_threshold_pct||80}
                  onChange={e => setEditForm({...editForm, budget_config: {...(editForm.budget_config||{}), alert_threshold_pct: parseInt(e.target.value)}})} />
                <div style={{fontSize:11,color:"#888",marginTop:3}}>Send governance alert when daily spend reaches this % of the daily cap</div>
              </div>
            </>)}
            {actionMsg && showEdit && <div className={`alert alert-${actionMsg.type}`}>{actionMsg.text}</div>}
            <div className="modal-actions">
              <button type="button" className="btn btn-outline" onClick={() => setShowEdit(false)}>Cancel</button>
              {editStep > 1 && <button type="button" className="btn btn-outline" onClick={() => setEditStep(editStep-1)}>← Back</button>}
              <button type="submit" className="btn btn-primary" disabled={submitting}>
                {editStep < 3 ? "Next →" : submitting ? "Saving…" : "Save Changes"}
              </button>
            </div>
          </form>
        </Modal>
      )}

      {/* Modal: Request Approval */}
      {showRequestApproval && (
        <Modal title="Request Maker-Checker Approval" onClose={() => setShowRequestApproval(false)}>
          <div className="alert alert-info" style={{fontSize:12,marginBottom:14}}>
            Submit a request to unlock a gated stage transition. A <strong>Governance Lead</strong> (checker) will review and approve it in the <strong>Governance Queue</strong> tab. Once approved, use <strong>Move Stage</strong> to execute the transition.
          </div>
          <form onSubmit={submitApprovalRequest}>
            <div className="form-group">
              <label>Current Stage</label>
              <input readOnly value={agent.current_stage} style={{background:"#f8f9fa",color:"#555",cursor:"default"}} />
            </div>
            <div className="form-group">
              <label>Target Stage</label>
              <select required value={approvalReqForm.to_stage}
                onChange={e => setApprovalReqForm({...approvalReqForm, to_stage: e.target.value, request_type: e.target.value === "Retired" ? "retirement" : "promotion"})}>
                <option value="">— select target stage —</option>
                {(agent.allowed_transitions || []).map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Request Type</label>
              <select value={approvalReqForm.request_type}
                onChange={e => setApprovalReqForm({...approvalReqForm, request_type: e.target.value})}>
                <option value="promotion">Promotion</option>
                <option value="retirement">Retirement</option>
              </select>
            </div>
            <div className="form-group">
              <label>Proposed By (your name / role)</label>
              <input required value={approvalReqForm.proposed_by}
                onChange={e => setApprovalReqForm({...approvalReqForm, proposed_by: e.target.value})} />
            </div>
            <div className="form-group">
              <label>Your Comment <span style={{fontWeight:400,color:"#aaa"}}>(optional — visible to the checker)</span></label>
              <textarea rows="3" placeholder="e.g. Eval results exceeded threshold on all 15 golden cases. Ready for canary rollout at 10% traffic."
                value={approvalReqForm.notes}
                onChange={e => setApprovalReqForm({...approvalReqForm, notes: e.target.value})}
                style={{minHeight:80}} />
            </div>
            {actionMsg && showRequestApproval && <div className={`alert alert-${actionMsg.type}`}>{actionMsg.text}</div>}
            <div className="modal-actions">
              <button type="button" className="btn btn-outline" onClick={() => setShowRequestApproval(false)}>Cancel</button>
              <button type="submit" className="btn btn-primary" disabled={submitting || !approvalReqForm.to_stage}>
                {submitting ? "Submitting…" : "Submit Request"}
              </button>
            </div>
          </form>
        </Modal>
      )}

      {/* Modal: Move Stage */}
      {showTransition && (
        <Modal title="Move Lifecycle Stage" large={["Under Monitoring","Deprecated"].includes(transForm.to_stage)} onClose={() => setShowTransition(false)}>
          <form onSubmit={doTransition}>
            <div className="alert alert-info" style={{marginBottom:14,fontSize:12}}>
              Current stage: <strong>{agent.current_stage}</strong> · Allowed next: {agent.allowed_transitions?.join(", ") || "none"}
            </div>
            <div className="form-group">
              <label>Target Stage</label>
              <select required value={transForm.to_stage} onChange={e => setTransForm({...transForm, to_stage: e.target.value})}>
                <option value="">— select —</option>
                {(agent.allowed_transitions || []).map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            {/* Show approval status when a gated transition is selected */}
            {transForm.to_stage && (() => {
              const approved = approvals.find(a => a.to_stage === transForm.to_stage && a.decision === "approved");
              const pending  = approvals.find(a => a.to_stage === transForm.to_stage && !a.decision);
              if (approved) return (
                <div className="alert alert-success" style={{fontSize:12}}>
                  ✓ Approved maker-checker request found — you can proceed with this transition.
                </div>
              );
              if (pending) return (
                <div className="alert alert-warn" style={{fontSize:12}}>
                  ⏳ An approval request is pending in the <strong>Governance Queue</strong>. A checker must approve it before you can move stage.
                </div>
              );
              return (
                <div className="alert alert-info" style={{fontSize:12}}>
                  ℹ️ This transition may require an approved maker-checker request. If it fails, go to the <strong>Approvals tab</strong> and submit a request first.
                </div>
              );
            })()}
            <div className="form-group">
              <label>Triggered By</label>
              <input value={transForm.triggered_by} onChange={e => setTransForm({...transForm, triggered_by: e.target.value})} />
            </div>
            <div className="form-group">
              <label>Reason</label>
              <textarea value={transForm.reason} onChange={e => setTransForm({...transForm, reason: e.target.value})} />
            </div>

            {/* Standby date — shown only when moving to Deprecated */}
            {transForm.to_stage === "Deprecated" && (
              <div>
                <div className="section-label">⏸ Standby / Wind-Down Config</div>
                <div className="alert alert-warn" style={{fontSize:12,marginBottom:14}}>
                  The agent stays live in standby mode until this date, giving teams time to migrate. After this date it can be fully Retired.
                </div>
                <div className="form-group">
                  <label>Standby Until (last day agent remains available)</label>
                  <input type="date" value={standbyUntil} onChange={e => setStandbyUntil(e.target.value)} />
                </div>
              </div>
            )}

            {/* Canary config — shown only when moving to Under Monitoring */}
            {transForm.to_stage === "Under Monitoring" && (
              <div>
                <div className="section-label">🧪 Canary / Gradual Rollout Config</div>
                <div className="alert alert-warn" style={{fontSize:12,marginBottom:14}}>
                  Define how much traffic and data this agent will receive during monitoring, and when the window starts and ends.
                </div>
                <div className="grid-2" style={{gap:10}}>
                  <div className="form-group">
                    <label>Traffic % routed to agent</label>
                    <input type="number" min="1" max="100" required
                      value={monitoringConfig.traffic_pct}
                      onChange={e => setMonitoringConfig({...monitoringConfig, traffic_pct: parseInt(e.target.value)})} />
                  </div>
                  <div className="form-group">
                    <label>Data Scope</label>
                    <input placeholder="e.g. Low-risk cases, Region A" required
                      value={monitoringConfig.data_scope}
                      onChange={e => setMonitoringConfig({...monitoringConfig, data_scope: e.target.value})} />
                  </div>
                  <div className="form-group">
                    <label>Start Date</label>
                    <input type="date" required value={monitoringConfig.start_date}
                      onChange={e => setMonitoringConfig({...monitoringConfig, start_date: e.target.value})} />
                  </div>
                  <div className="form-group">
                    <label>End Date</label>
                    <input type="date" required value={monitoringConfig.end_date}
                      onChange={e => setMonitoringConfig({...monitoringConfig, end_date: e.target.value})} />
                  </div>
                </div>
              </div>
            )}

            {actionMsg && <div className={`alert alert-${actionMsg.type}`}>{actionMsg.text}</div>}
            <div className="modal-actions">
              <button type="button" className="btn btn-outline" onClick={() => setShowTransition(false)}>Cancel</button>
              <button type="submit" className="btn btn-primary" disabled={submitting}>{submitting ? "Moving…" : "Move Stage"}</button>
            </div>
          </form>
        </Modal>
      )}

      {/* Modal: Submit Eval */}
      {showEval && (
        <Modal title="Submit Eval Result" onClose={() => setShowEval(false)}>
          <form onSubmit={submitEval}>
            <div className="grid-2" style={{gap:10}}>
              <div className="form-group">
                <label>Version</label>
                <input value={evalForm.version} onChange={e => setEvalForm({...evalForm, version: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Run By</label>
                <input value={evalForm.run_by} onChange={e => setEvalForm({...evalForm, run_by: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Pass Rate (0–1)</label>
                <input type="number" step="0.01" min="0" max="1" value={evalForm.pass_rate}
                  onChange={e => setEvalForm({...evalForm, pass_rate: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Avg Score</label>
                <input type="number" step="0.01" value={evalForm.avg_score}
                  onChange={e => setEvalForm({...evalForm, avg_score: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Total Cases</label>
                <input type="number" value={evalForm.total_cases}
                  onChange={e => setEvalForm({...evalForm, total_cases: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Passed Cases</label>
                <input type="number" value={evalForm.passed_cases}
                  onChange={e => setEvalForm({...evalForm, passed_cases: e.target.value})} />
              </div>
            </div>
            <div className="form-group">
              <label>
                <input type="checkbox" checked={evalForm.threshold_met}
                  onChange={e => setEvalForm({...evalForm, threshold_met: e.target.checked})}
                  style={{width:"auto",marginRight:8}} />
                Threshold met
              </label>
            </div>
            {actionMsg && <div className={`alert alert-${actionMsg.type}`}>{actionMsg.text}</div>}
            <div className="modal-actions">
              <button type="button" className="btn btn-outline" onClick={() => setShowEval(false)}>Cancel</button>
              <button type="submit" className="btn btn-primary" disabled={submitting}>{submitting ? "Submitting…" : "Submit Eval"}</button>
            </div>
          </form>
        </Modal>
      )}

      {/* Modal: Propose Retirement */}
      {showRetire && (
        <Modal title="Propose Retirement" onClose={() => setShowRetire(false)}>
          <div className="alert alert-warn" style={{marginBottom:14,fontSize:12}}>
            This creates a retirement approval request. A governance lead must approve before the stage changes.
          </div>
          <form onSubmit={submitRetire}>
            <div className="form-group">
              <label>Proposed By</label>
              <input value={retireForm.proposed_by} onChange={e => setRetireForm({...retireForm, proposed_by: e.target.value})} />
            </div>
            <div className="form-group">
              <label>Reason</label>
              <textarea required value={retireForm.reason} onChange={e => setRetireForm({...retireForm, reason: e.target.value})}
                placeholder="Why is this agent being retired?" />
            </div>
            <div className="form-group">
              <label>Proposed Retirement Date (optional)</label>
              <input type="date" value={retireForm.retirement_date}
                onChange={e => setRetireForm({...retireForm, retirement_date: e.target.value})} />
            </div>
            {actionMsg && <div className={`alert alert-${actionMsg.type}`}>{actionMsg.text}</div>}
            <div className="modal-actions">
              <button type="button" className="btn btn-outline" onClick={() => setShowRetire(false)}>Cancel</button>
              <button type="submit" className="btn btn-danger" disabled={submitting}>{submitting ? "Proposing…" : "Propose Retirement"}</button>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}

// ── Governance Queue View ─────────────────────────────────────────────────

function GovernanceQueueView({ onSelectAgent }) {
  const [queueTab, setQueueTab]         = React.useState("alerts");
  const [requests, setRequests]         = React.useState(null);
  const [decidedRequests, setDecidedRequests] = React.useState([]);
  const [allAlerts, setAllAlerts]       = React.useState(null);
  const [error, setError]               = React.useState(null);
  const [decideModal, setDecideModal]   = React.useState(null);
  const [decideForm, setDecideForm]     = React.useState({ decision: "approved", reviewed_by: "Governance Lead", reason: "" });
  const [submitting, setSubmitting]     = React.useState(false);
  const [msg, setMsg]                   = React.useState(null);

  // Alert action state (same pattern as AgentDetailView)
  const [alertAction, setAlertAction]     = React.useState(null);
  const [newCapValue, setNewCapValue]     = React.useState("");
  const [newModelValue, setNewModelValue] = React.useState("");
  const [agentCache, setAgentCache]       = React.useState({}); // agent_id → classification

  async function load() {
    try {
      const [agents, decided, alertsData] = await Promise.all([
        apiFetch("/agents"),
        apiFetch("/approvals?decided_only=true&limit=20"),
        apiFetch("/alerts?active_only=false&limit=100"),
      ]);
      // Build agent cache for classification lookups
      const cache = {};
      agents.forEach(a => { cache[a.id] = typeof a.classification === "string" ? JSON.parse(a.classification) : (a.classification || {}); });
      setAgentCache(cache);

      const all = [];
      await Promise.all(agents.map(async a => {
        const reqs = await apiFetch(`/agents/${a.id}/approvals?pending_only=true`);
        reqs.forEach(r => all.push({ ...r, agent_name: a.name, agent_id: a.id }));
      }));
      all.sort((a, b) => new Date(b.proposed_at) - new Date(a.proposed_at));
      setRequests(all);
      setDecidedRequests(decided);
      setAllAlerts(alertsData);
    } catch (e) { setError(e.message); }
  }

  React.useEffect(() => { load(); }, []);

  async function doDecide(e) {
    e.preventDefault();
    setSubmitting(true); setMsg(null);
    try {
      await apiFetch(`/agents/${decideModal.agentId}/approvals/${decideModal.reqId}/decision`,
        { method: "POST", body: JSON.stringify(decideForm) });
      setMsg({ type: "success", text: `Request ${decideForm.decision}.` });
      setDecideModal(null);
      load();
    } catch (e) { setMsg({ type: "error", text: e.message }); }
    finally { setSubmitting(false); }
  }

  // ── Alert actions (per-agent, from the queue) ────────────────────────────
  async function resolveAlert(agentId, alertId) {
    await apiFetch(`/agents/${agentId}/alerts/${alertId}/resolve?resolved_by=Governance%20Lead`,
      { method: "POST", body: JSON.stringify({}) });
  }

  async function patchAgentClassification(agentId, patch) {
    const current = agentCache[agentId] || {};
    const updated = { ...current, ...patch };
    await apiFetch(`/agents/${agentId}`, {
      method: "PATCH",
      body: JSON.stringify({ classification: updated, actor: "Governance Lead" }),
    });
    setAgentCache(c => ({ ...c, [agentId]: updated }));
  }

  async function handleExtendCap(agentId, alertId) {
    const cap = parseFloat(newCapValue);
    if (!cap || cap <= 0) { setMsg({ type:"error", text:"Enter a valid cap amount." }); return; }
    setSubmitting(true);
    try {
      const bc = agentCache[agentId]?.budget_config || {};
      await patchAgentClassification(agentId, { budget_config: { ...bc, max_cost_per_day: cap, cap_extended_at: new Date().toISOString(), cap_extended_from: bc.max_cost_per_day } });
      if (newModelValue) await patchAgentClassification(agentId, { model: newModelValue, previous_model: agentCache[agentId]?.model, model_switched_at: new Date().toISOString() });
      await resolveAlert(agentId, alertId);
      setAlertAction(null); setNewCapValue(""); setNewModelValue("");
      setMsg({ type:"success", text:`Daily cap extended to $${cap.toFixed(3)} for ${allAlerts.find(a=>a.id===alertId)?.agent_name}.` });
      load();
    } catch(e) { setMsg({ type:"error", text: e.message }); }
    finally { setSubmitting(false); }
  }

  async function handleSwitchModel(agentId, alertId) {
    if (!newModelValue) { setMsg({ type:"error", text:"Select a model." }); return; }
    setSubmitting(true);
    try {
      const oldModel = agentCache[agentId]?.model;
      await patchAgentClassification(agentId, { model: newModelValue, previous_model: oldModel, model_switched_at: new Date().toISOString() });
      await resolveAlert(agentId, alertId);
      setAlertAction(null); setNewModelValue("");
      setMsg({ type:"success", text:`Model switched to ${newModelValue}.` });
      load();
    } catch(e) { setMsg({ type:"error", text: e.message }); }
    finally { setSubmitting(false); }
  }

  async function handlePauseRequests(agentId, alertId) {
    if (!confirm(`Pause all new requests for ${allAlerts.find(a=>a.id===alertId)?.agent_name}?`)) return;
    setSubmitting(true);
    try {
      const bc = agentCache[agentId]?.budget_config || {};
      await patchAgentClassification(agentId, { budget_config: { ...bc, requests_paused: true, paused_at: new Date().toISOString() } });
      await resolveAlert(agentId, alertId);
      setMsg({ type:"warn", text:"Requests paused. Resume from the agent's Overview tab → Budget card." });
      load();
    } catch(e) { setMsg({ type:"error", text: e.message }); }
    finally { setSubmitting(false); }
  }

  async function handleDismissAlert(agentId, alertId) {
    setSubmitting(true);
    try {
      await resolveAlert(agentId, alertId);
      setMsg({ type:"success", text:"Alert acknowledged and dismissed." });
      load();
    } catch(e) { setMsg({ type:"error", text: e.message }); }
    finally { setSubmitting(false); }
  }

  // ── Helpers for alert rendering ──────────────────────────────────────────
  const sevIcon   = { critical:"🔴", warning:"🟡", info:"🔵" };
  const sevBg     = { critical:"#fff5f5", warning:"#fffbeb", info:"#eff6ff" };
  const sevBorder = { critical:"#fca5a5", warning:"#fde68a", info:"#bfdbfe" };
  const sevColor  = { critical:"#991b1b", warning:"#92400e", info:"#1e40af" };

  if (error) return <div className="alert alert-error">{error}</div>;
  if (!requests || !allAlerts) return <div className="loading">Loading governance queue…</div>;

  const activeAlerts   = allAlerts.filter(a => !a.resolved_at);
  const resolvedAlerts = allAlerts.filter(a =>  a.resolved_at);
  const criticalCount  = activeAlerts.filter(a => a.severity === "critical").length;

  return (
    <div>
      <div className="page-title">Governance Queue</div>
      {msg && <div className={`alert alert-${msg.type}`}>{msg.text}</div>}

      {/* ── Summary stats ── */}
      <div className="grid-3" style={{marginBottom:20}}>
        <div className="stat-box" style={{borderLeft: activeAlerts.length > 0 ? "4px solid #e03131" : "4px solid #2f9e44"}}>
          <div className="stat-label">Active Alerts</div>
          <div className="stat-value" style={{color: activeAlerts.length > 0 ? "#e03131" : "#2f9e44"}}>{activeAlerts.length}</div>
          <div className="stat-sub">{criticalCount > 0 ? `${criticalCount} critical` : "No critical alerts"}</div>
        </div>
        <div className="stat-box" style={{borderLeft: requests.length > 0 ? "4px solid #e67700" : "4px solid #2f9e44"}}>
          <div className="stat-label">Pending Approvals</div>
          <div className="stat-value" style={{color: requests.length > 0 ? "#e67700" : "#2f9e44"}}>{requests.length}</div>
          <div className="stat-sub">{requests.filter(r=>r.request_type==="promotion").length} promotions · {requests.filter(r=>r.request_type==="retirement").length} retirements</div>
        </div>
        <div className="stat-box">
          <div className="stat-label">Recently Decided</div>
          <div className="stat-value">{decidedRequests.length}</div>
          <div className="stat-sub">Last 20 decisions</div>
        </div>
      </div>

      {/* ── Tabs ── */}
      <div style={{display:"flex", gap:2, marginBottom:16, borderBottom:"2px solid #eee"}}>
        {[
          { key:"alerts",    label:"Alerts",    badge: activeAlerts.length,  badgeColor:"#e03131" },
          { key:"approvals", label:"Approvals", badge: requests.length,       badgeColor:"#e67700" },
          { key:"activity",  label:"Activity",  badge: null },
        ].map(t => (
          <button key={t.key} onClick={() => setQueueTab(t.key)}
            style={{padding:"8px 18px", background:"none", border:"none", cursor:"pointer",
              borderBottom: queueTab===t.key ? "2px solid #3b5bdb" : "2px solid transparent",
              color: queueTab===t.key ? "#3b5bdb" : "#888", fontWeight: queueTab===t.key ? 600 : 400,
              fontSize:13, marginBottom:"-2px"}}>
            {t.label}
            {t.badge > 0 && <span style={{background:t.badgeColor,color:"#fff",borderRadius:8,padding:"1px 6px",fontSize:10,marginLeft:6}}>{t.badge}</span>}
          </button>
        ))}
      </div>

      {/* ════════════════════ TAB: ALERTS ════════════════════ */}
      {queueTab === "alerts" && (
        <div>
          {activeAlerts.length === 0 && resolvedAlerts.length === 0 && (
            <div className="empty">No alerts across any agents. All systems nominal ✓</div>
          )}

          {activeAlerts.length > 0 && (
            <div className="card" style={{marginBottom:16}}>
              <div className="card-title" style={{marginBottom:14}}>
                🔴 Active Alerts
                <span style={{marginLeft:8,background:"#e03131",color:"#fff",borderRadius:8,padding:"2px 8px",fontSize:11}}>{activeAlerts.length}</span>
              </div>
              <div style={{display:"flex", flexDirection:"column", gap:12}}>
                {activeAlerts.map(alert => {
                  const bg     = sevBg[alert.severity]     || "#fff";
                  const border = sevBorder[alert.severity] || "#ddd";
                  const color  = sevColor[alert.severity]  || "#333";
                  const isExpanded = alertAction?.alertId === alert.id;
                  return (
                    <div key={alert.id} style={{background:bg, border:`1px solid ${border}`, borderRadius:8, padding:"12px 16px"}}>
                      <div style={{display:"flex", alignItems:"flex-start", gap:10}}>
                        <span style={{fontSize:18, flexShrink:0}}>{sevIcon[alert.severity] || "⚪"}</span>
                        <div style={{flex:1}}>
                          {/* Header */}
                          <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:4}}>
                            <span className="clickable" style={{fontWeight:700, fontSize:13, color:"#3b5bdb"}} onClick={() => onSelectAgent(alert.agent_id)}>
                              {alert.agent_name}
                            </span>
                            <span style={{fontSize:11, color:"#aaa"}}>›</span>
                            <span style={{fontWeight:600, fontSize:13, color}}>{alert.title}</span>
                            <span style={{fontSize:10, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.5px", background:border, color, borderRadius:4, padding:"1px 6px"}}>{alert.severity}</span>
                            <span style={{fontSize:10, color:"#9ca3af", background:"#f3f4f6", borderRadius:4, padding:"1px 6px"}}>{alert.alert_type.replace(/_/g," ")}</span>
                            <span style={{marginLeft:"auto", fontSize:11, color:"#9ca3af"}}>{fmtDate(alert.triggered_at)}</span>
                          </div>
                          {/* Message */}
                          <div style={{fontSize:12, color:"#555", lineHeight:1.5, marginBottom:6}}>{alert.message}</div>
                          {/* Metadata chips */}
                          {alert.metadata && Object.keys(alert.metadata).length > 0 && (
                            <div style={{display:"flex", gap:10, flexWrap:"wrap", marginBottom:8}}>
                              {Object.entries(alert.metadata).map(([k,v]) => (
                                <span key={k} style={{fontSize:11, color:"#6b7280", background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:4, padding:"1px 8px"}}>
                                  <strong>{k.replace(/_/g," ")}:</strong> {String(v)}
                                </span>
                              ))}
                            </div>
                          )}

                          {/* ── Action panel ── */}
                          <div style={{paddingTop:10, borderTop:`1px solid ${border}`}}>
                            {alert.alert_type === "cost_threshold" ? (
                              isExpanded && alertAction.type === "extend" ? (
                                <div>
                                  <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:8}}>
                                    Set new daily cap for <em>{alert.agent_name}</em> (current: ${alert.metadata?.daily_cap_usd?.toFixed(3) ?? "?"})
                                  </div>
                                  <div style={{display:"flex", gap:8, flexWrap:"wrap", alignItems:"center"}}>
                                    <input type="number" step="0.001" min="0" placeholder="New cap e.g. 0.025"
                                      value={newCapValue} onChange={e => setNewCapValue(e.target.value)}
                                      style={{width:150, marginBottom:0}} autoFocus />
                                    <select value={newModelValue} onChange={e => setNewModelValue(e.target.value)} style={{width:200, marginBottom:0}}>
                                      <option value="">Keep current model</option>
                                      <option value="claude-haiku-4-5">claude-haiku-4-5 (cheapest)</option>
                                      <option value="claude-3-haiku-20240307">claude-3-haiku-20240307</option>
                                      <option value="gpt-4o-mini">gpt-4o-mini</option>
                                      <option value="mistral-7b">mistral-7b</option>
                                    </select>
                                    <button className="btn btn-primary btn-sm" disabled={submitting} onClick={() => handleExtendCap(alert.agent_id, alert.id)}>✓ Confirm</button>
                                    <button className="btn btn-outline btn-sm" onClick={() => setAlertAction(null)}>Cancel</button>
                                  </div>
                                </div>
                              ) : isExpanded && alertAction.type === "model" ? (
                                <div>
                                  <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:8}}>Switch to lower-cost model for <em>{alert.agent_name}</em></div>
                                  <div style={{display:"flex", gap:8, alignItems:"center"}}>
                                    <select value={newModelValue} onChange={e => setNewModelValue(e.target.value)} style={{width:220, marginBottom:0}} autoFocus>
                                      <option value="">Select model…</option>
                                      <option value="claude-haiku-4-5">claude-haiku-4-5 (~60% cheaper)</option>
                                      <option value="claude-3-haiku-20240307">claude-3-haiku-20240307</option>
                                      <option value="gpt-4o-mini">gpt-4o-mini</option>
                                      <option value="mistral-7b">mistral-7b</option>
                                    </select>
                                    <button className="btn btn-primary btn-sm" disabled={submitting} onClick={() => handleSwitchModel(alert.agent_id, alert.id)}>Switch</button>
                                    <button className="btn btn-outline btn-sm" onClick={() => setAlertAction(null)}>Cancel</button>
                                  </div>
                                </div>
                              ) : (
                                <div style={{display:"flex", gap:8, flexWrap:"wrap", alignItems:"center"}}>
                                  <span style={{fontSize:11, color:"#6b7280", marginRight:4}}>Take action:</span>
                                  <button className="btn btn-primary btn-sm" onClick={() => { setAlertAction({ alertId:alert.id, type:"extend" }); setNewCapValue(""); setNewModelValue(""); }}>↑ Extend Daily Cap</button>
                                  <button className="btn btn-sm" style={{background:"#7c3aed",color:"#fff"}} onClick={() => { setAlertAction({ alertId:alert.id, type:"model" }); setNewModelValue(""); }}>⚡ Switch Model</button>
                                  <button className="btn btn-danger btn-sm" disabled={submitting} onClick={() => handlePauseRequests(alert.agent_id, alert.id)}>⏸ Pause Requests</button>
                                  <button className="btn btn-outline btn-sm" disabled={submitting} onClick={() => handleDismissAlert(alert.agent_id, alert.id)}>Dismiss</button>
                                  <button className="btn btn-outline btn-sm" onClick={() => onSelectAgent(alert.agent_id)}>View Agent →</button>
                                </div>
                              )
                            ) : (
                              <div style={{display:"flex", gap:8, flexWrap:"wrap", alignItems:"center"}}>
                                <span style={{fontSize:11, color:"#6b7280", marginRight:4}}>Take action:</span>
                                <button className="btn btn-outline btn-sm" disabled={submitting} onClick={() => handleDismissAlert(alert.agent_id, alert.id)}>✓ Acknowledge</button>
                                <button className="btn btn-outline btn-sm" onClick={() => onSelectAgent(alert.agent_id)}>View Agent →</button>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {resolvedAlerts.length > 0 && (
            <div className="card">
              <div className="card-title" style={{marginBottom:14}}>
                ✅ Resolved Alerts
                <span style={{marginLeft:8, background:"#e5e7eb", color:"#6b7280", borderRadius:8, padding:"2px 8px", fontSize:11}}>{resolvedAlerts.length}</span>
              </div>
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                {resolvedAlerts.map(alert => (
                  <div key={alert.id} style={{background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:8, padding:"10px 14px", opacity:0.75}}>
                    <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
                      <span>✅</span>
                      <span className="clickable" style={{fontSize:12, fontWeight:600, color:"#3b5bdb"}} onClick={() => onSelectAgent(alert.agent_id)}>{alert.agent_name}</span>
                      <span style={{fontSize:12, color:"#6b7280"}}>{alert.title}</span>
                      <span style={{fontSize:10, color:"#9ca3af", background:"#f3f4f6", borderRadius:4, padding:"1px 6px"}}>{alert.alert_type.replace(/_/g," ")}</span>
                      <span style={{marginLeft:"auto", fontSize:11, color:"#9ca3af"}}>Resolved by {alert.resolved_by} · {fmtDate(alert.resolved_at)}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ════════════════════ TAB: APPROVALS ════════════════════ */}
      {queueTab === "approvals" && (
        <div className="card">
          <div className="card-title" style={{marginBottom:12}}>Pending Approval Requests</div>
          {requests.length === 0 ? (
            <div className="empty">No pending requests. Queue is clear ✓</div>
          ) : (
            <table>
              <thead><tr><th>Agent</th><th>Type</th><th>Transition</th><th>Proposed By</th><th>Proposed At</th><th>Action</th></tr></thead>
              <tbody>
                {requests.map(r => (
                  <tr key={r.id}>
                    <td><span className="clickable" onClick={() => onSelectAgent(r.agent_id)}>{r.agent_name}</span></td>
                    <td><span className="tag">{r.request_type}</span></td>
                    <td style={{fontSize:12}}>{r.from_stage} → {r.to_stage}</td>
                    <td style={{fontSize:12}}>{r.proposed_by}</td>
                    <td style={{fontSize:12,color:"#888"}}>{fmtDate(r.proposed_at)}</td>
                    <td>
                      <button className="btn btn-outline btn-sm"
                        onClick={() => { setDecideModal({agentId: r.agent_id, reqId: r.id, req: r}); setMsg(null); }}>
                        Review
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* ════════════════════ TAB: ACTIVITY ════════════════════ */}
      {queueTab === "activity" && (
        <div className="card">
          <div className="card-title" style={{marginBottom:4}}>Recent Governance Activity</div>
          <div style={{fontSize:12,color:"#888",marginBottom:14}}>Recently decided approval requests — maker comments and checker decisions side by side.</div>
          {decidedRequests.length === 0 ? (
            <div className="empty">No decided requests yet.</div>
          ) : (
            <div>
              {decidedRequests.map(ap => (
                <div key={ap.id} style={{borderBottom:"1px solid #f0f0f0", padding:"16px 0"}}>
                  <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:10}}>
                    <span className="clickable" style={{fontWeight:700, fontSize:13}} onClick={() => onSelectAgent(ap.agent_id)}>{ap.agent_name}</span>
                    <span className="tag">{ap.request_type}</span>
                    <span style={{fontSize:12, color:"#555"}}>{ap.from_stage} → {ap.to_stage}</span>
                    {ap.decision === "approved"
                      ? <span className="decision-approved">✓ Approved</span>
                      : <span className="decision-rejected">✗ Rejected</span>}
                    <span style={{marginLeft:"auto", fontSize:11, color:"#aaa"}}>{fmtDate(ap.reviewed_at)}</span>
                  </div>
                  <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
                    <div style={{background:"#f8f9ff", border:"1px solid #e0e4f8", borderRadius:8, padding:"10px 12px"}}>
                      <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:6}}>
                        <div style={{width:20, height:20, borderRadius:"50%", background:"#e8eaf6", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:800, color:"#3b5bdb"}}>M</div>
                        <span style={{fontSize:12, fontWeight:700, color:"#3b5bdb"}}>Maker</span>
                        <span style={{fontSize:11, color:"#888"}}>{ap.proposed_by}</span>
                      </div>
                      <div style={{fontSize:12, color: ap.notes ? "#333" : "#aaa", fontStyle: ap.notes ? "normal" : "italic", lineHeight:1.5}}>{ap.notes || "No comment added."}</div>
                      <div style={{fontSize:11, color:"#aaa", marginTop:6}}>{fmtDate(ap.proposed_at)}</div>
                    </div>
                    <div style={{background: ap.decision==="approved" ? "#f3fbf4" : "#fff5f5", border:`1px solid ${ap.decision==="approved"?"#b2f2bb":"#ffc9c9"}`, borderRadius:8, padding:"10px 12px"}}>
                      <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:6}}>
                        <div style={{width:20, height:20, borderRadius:"50%", background: ap.decision==="approved"?"#d3f9d8":"#ffe3e3", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:800, color: ap.decision==="approved"?"#2f9e44":"#c92a2a"}}>C</div>
                        <span style={{fontSize:12, fontWeight:700, color: ap.decision==="approved"?"#2f9e44":"#c92a2a"}}>Checker</span>
                        <span style={{fontSize:11, color:"#888"}}>{ap.reviewed_by}</span>
                      </div>
                      <div style={{fontSize:12, color: ap.reason ? "#333" : "#aaa", fontStyle: ap.reason ? "normal" : "italic", lineHeight:1.5}}>{ap.reason || "No reason provided."}</div>
                      <div style={{fontSize:11, color:"#aaa", marginTop:6}}>{fmtDate(ap.reviewed_at)}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── Decide Modal ── */}
      {decideModal && (
        <Modal title="Review Approval Request" large onClose={() => setDecideModal(null)}>
          <div style={{background:"#f8f9fa", border:"1px solid #e9ecef", borderRadius:8, padding:14, marginBottom:16}}>
            <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:8}}>
              <span style={{fontWeight:700, fontSize:14}}>{decideModal.req.agent_name}</span>
              <span className="tag">{decideModal.req.request_type}</span>
              <span style={{fontSize:13, color:"#555"}}>{decideModal.req.from_stage} → {decideModal.req.to_stage}</span>
            </div>
            <div style={{fontSize:12, color:"#888"}}>Requested by <strong style={{color:"#333"}}>{decideModal.req.proposed_by}</strong> on {fmtDate(decideModal.req.proposed_at)}</div>
            {decideModal.req.eval_result_id && <div style={{marginTop:6, fontSize:12, color:"#2f9e44"}}>✓ Eval result attached</div>}
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12, fontWeight:700, color:"#555", marginBottom:6}}>💬 Comment from Maker</div>
            {decideModal.req.notes
              ? <div style={{fontSize:13, color:"#333", background:"#f8f9ff", border:"1px solid #e0e4f8", borderRadius:6, padding:"10px 14px", lineHeight:1.6}}>{decideModal.req.notes}</div>
              : <div style={{fontSize:12, color:"#aaa", fontStyle:"italic"}}>No comment was added with this request.</div>}
          </div>
          <form onSubmit={doDecide}>
            <div className="form-group">
              <label>Your Decision</label>
              <select value={decideForm.decision} onChange={e => setDecideForm({...decideForm, decision: e.target.value})}>
                <option value="approved">✓ Approve</option>
                <option value="rejected">✗ Reject</option>
              </select>
            </div>
            <div className="form-group">
              <label>Reviewed By</label>
              <input value={decideForm.reviewed_by} onChange={e => setDecideForm({...decideForm, reviewed_by: e.target.value})} />
            </div>
            <div className="form-group">
              <label>Your Comment / Reason <span style={{color:"#e03131",fontWeight:700}}>*</span></label>
              <textarea required rows="3" value={decideForm.reason}
                onChange={e => setDecideForm({...decideForm, reason: e.target.value})}
                placeholder="Document your decision rationale — recorded in the immutable audit log." style={{minHeight:90}} />
            </div>
            {msg && <div className={`alert alert-${msg.type}`}>{msg.text}</div>}
            <div className="modal-actions">
              <button type="button" className="btn btn-outline" onClick={() => setDecideModal(null)}>Cancel</button>
              <button type="submit" className={`btn ${decideForm.decision==="approved"?"btn-success":"btn-danger"}`} disabled={submitting}>
                {submitting ? "Submitting…" : decideForm.decision === "approved" ? "✓ Approve Request" : "✗ Reject Request"}
              </button>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}

// ── Login Screen ──────────────────────────────────────────────────────────

function LoginScreen({ onLogin }) {
  const [username, setUsername] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [errors, setErrors]     = React.useState({});
  const [shake, setShake]       = React.useState(false);

  function validate() {
    const e = {};
    if (username.trim().length < 4) e.username = "Username must be at least 4 characters.";
    if (password.length < 4)        e.password = "Password must be at least 4 characters.";
    return e;
  }

  function handleSubmit(ev) {
    ev.preventDefault();
    const e = validate();
    if (Object.keys(e).length) {
      setErrors(e);
      setShake(true);
      setTimeout(() => setShake(false), 500);
      return;
    }
    setErrors({});
    onLogin(username.trim());
  }

  return (
    <div className="login-wrap">
      <div className="login-card" style={shake ? {animation:"shake 0.4s"} : {}}>
        <div className="login-logo">A</div>
        <div className="login-title">AgentOps</div>
        <div className="login-sub">Cradle-to-Grave AI Governance Platform</div>
        <form onSubmit={handleSubmit} noValidate>
          <div className="login-field">
            <label>Username</label>
            <input
              type="text" autoComplete="username" placeholder="Enter username"
              className={errors.username ? "err" : ""}
              value={username} onChange={e => setUsername(e.target.value)}
            />
            {errors.username && <div className="login-err">{errors.username}</div>}
          </div>
          <div className="login-field">
            <label>Password</label>
            <input
              type="password" autoComplete="current-password" placeholder="Enter password"
              className={errors.password ? "err" : ""}
              value={password} onChange={e => setPassword(e.target.value)}
            />
            {errors.password && <div className="login-err">{errors.password}</div>}
          </div>
          <button type="submit" className="login-btn">Sign In</button>
        </form>
        <div className="login-hint">Demo mode · any credentials (min 4 chars each)</div>
      </div>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

// ── App Shell ─────────────────────────────────────────────────────────────

function App() {
  const [loggedIn, setLoggedIn]     = React.useState(() => !!sessionStorage.getItem("ao_user"));
  const [username, setUsername]     = React.useState(() => sessionStorage.getItem("ao_user") || "");
  const [view, setView]             = React.useState("registry");
  const [selectedAgent, setSelectedAgent] = React.useState(null);

  function handleLogin(name) {
    sessionStorage.setItem("ao_user", name);
    setUsername(name);
    setLoggedIn(true);
  }

  function handleLogout() {
    sessionStorage.removeItem("ao_user");
    setLoggedIn(false);
    setUsername("");
  }

  function selectAgent(id) {
    setSelectedAgent(id);
    setView("detail");
  }

  if (!loggedIn) return <LoginScreen onLogin={handleLogin} />;

  return (
    <div>
      <nav className="nav">
        <span className="nav-brand">AgentOps: Cradle to Grave</span>
        <span className={`nav-link ${view==="registry"?"active":""}`} onClick={() => setView("registry")}>Registry</span>
        <span className={`nav-link ${view==="queue"?"active":""}`} onClick={() => setView("queue")}>Governance Queue</span>
        {selectedAgent && (
          <span className={`nav-link ${view==="detail"?"active":""}`} onClick={() => setView("detail")}>
            Agent Detail
          </span>
        )}
        <div className="nav-user">
          <span className="nav-username">👤 {username}</span>
          <button className="nav-logout" onClick={handleLogout}>Sign out</button>
        </div>
      </nav>
      <div className="container">
        {view === "registry" && <RegistryView onSelectAgent={selectAgent} />}
        {view === "detail" && selectedAgent && <AgentDetailView agentId={selectedAgent} onSelectAgent={selectAgent} />}
        {view === "queue" && <GovernanceQueueView onSelectAgent={selectAgent} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
